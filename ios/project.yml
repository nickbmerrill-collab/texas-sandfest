name: TexasSandFest
options:
  bundleIdPrefix: com.portalcodex
  deploymentTarget:
    iOS: "18.0"
settings:
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "6.0"
targets:
  TexasSandFest:
    type: application
    platform: iOS
    sources:
      - TexasSandFest
    resources:
      - TexasSandFest/Resources
    info:
      path: TexasSandFest/Info.plist
      properties:
        CFBundleDisplayName: Texas SandFest
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: com.portalcodex.texassandfest.public
            CFBundleURLSchemes:
              - sandfest
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSCameraUsageDescription: Scan your Eventeny ticket QR to add it to your SandFest wristbands.
    entitlements:
      path: TexasSandFest/TexasSandFest.entitlements
      properties:
        aps-environment: development
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.portalcodex.texassandfest
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
  TexasSandFestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TexasSandFestTests
    dependencies:
      - target: TexasSandFest
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.portalcodex.texassandfest.tests
      BUNDLE_LOADER: $(TEST_HOST)
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/TexasSandFest.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TexasSandFest
