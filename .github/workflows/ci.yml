name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

jobs:
  platform:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Record manual verification scope
        if: github.event_name == 'workflow_dispatch'
        run: echo "::notice::Manual CI verifies commit $GITHUB_SHA only. Public release still requires a successful push-triggered main run."
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install browser acceptance runtime
        run: npx playwright install --with-deps chromium
      - name: Unit + pure suite
        run: npm run test:platform
      - name: Deployment acceptance gate contracts
        run: npm run test:deployment-verifier
      - name: Production container contract
        run: npm run test:container-contract
      - name: Render Blueprint production contract
        run: npm run test:render-blueprint
      - name: Vercel project isolation contract
        run: npm run test:vercel-project-guard
      - name: Camera edge-agent contract
        run: npm run test:camera-agent
      - name: Camera model approval contract
        run: npm run test:camera-model-approval
      - name: API smoke suite
        run: npm run test:platform:api
      - name: Isolated board runtime
        run: npm run test:board-runtime
      - name: Board capability certificate contract
        run: npm run test:board-certificate
      - name: Board macOS service lifecycle contract
        run: npm run test:board-service
      - name: Board demo supervisor recovery
        run: npm run test:board-supervisor
      - name: Board browser acceptance
        run: npm run test:browser
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: board-browser-failure
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Postgres production data plane
        env:
          SANDFEST_POSTGRES_TEST_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
        run: npm run test:postgres
      - name: iOS event data alignment
        run: npm run test:ios-event
      - name: Production build isolation (visitor + admin)
        run: npm run build:surfaces
      - name: Load test (public GETs)
        run: |
          SANDFEST_API_PORT=8791 SANDFEST_ADMIN_API_TOKEN=dev-admin-token-change-me npm run api:dev &
          API_PID=$!
          sleep 1
          npm run api:load-test -- http://127.0.0.1:8791 200 20
          kill $API_PID
      - name: Production dependency audit
        run: npm audit --audit-level=high

  browser-webkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install WebKit acceptance runtime
        run: npx playwright install --with-deps webkit
      - name: Safari-compatible board browser acceptance
        run: npm run test:browser:webkit:ci
      - name: Upload WebKit failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: board-browser-webkit-failure
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  ios-parse:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Swift parse all app sources
        run: |
          set -euo pipefail
          cd ios/TexasSandFest
          for f in *.swift; do
            echo "parse $f"
            swiftc -parse "$f"
          done
          plutil -lint ../TexasSandFest.xcodeproj/project.pbxproj
          swiftc Models.swift LiveTimeline.swift ../TimelineSmoke/main.swift -o /tmp/sandfest-timeline-smoke
          /tmp/sandfest-timeline-smoke
      - name: Xcode simulator tests and optimized build
        run: npm run test:ios-xcode
