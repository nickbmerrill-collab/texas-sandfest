name: Deploy public web to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deferred:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.SANDFEST_TURNSTILE_SITE_KEY == ''
    runs-on: ubuntu-latest
    steps:
      - name: Record deferred production release
        run: echo "::notice::Public release is deferred until the post-board production Turnstile site key is configured. No artifact was built or deployed."

  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.SANDFEST_TURNSTILE_SITE_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Require production Turnstile registration
        env:
          VITE_SANDFEST_TURNSTILE_SITE_KEY: ${{ vars.SANDFEST_TURNSTILE_SITE_KEY }}
        run: test -n "$VITE_SANDFEST_TURNSTILE_SITE_KEY" || (echo "::error::Set repository variable SANDFEST_TURNSTILE_SITE_KEY to the production Cloudflare widget site key." && exit 1)
      - name: Build visitor-only static site
        env:
          # Pages publishes at https://<owner>.github.io/<repo>/
          DEPLOY_BASE: /${{ github.event.repository.name }}/
          SANDFEST_DEPLOYMENT_ENV: production
          # Public identifier from the production Turnstile widget. The Vite
          # build rejects missing and Cloudflare test keys.
          VITE_SANDFEST_TURNSTILE_SITE_KEY: ${{ vars.SANDFEST_TURNSTILE_SITE_KEY }}
        run: npm run build:public && npm run test:pages-artifact
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
